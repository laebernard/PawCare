<div class="reset-password-page">
  <div class="content-container">
    <div class="reset-password-card">
      <div class="reset-password-header">
        <svg lucideHeart [size]="32" class="header-icon"></svg>
        <ds-title level="h2" text="Reinitialiser le mot de passe"></ds-title>
      </div>

      @if (successMessage()) {
        <div class="alert alert-success">{{ successMessage() }}</div>
      }

      @if (errorMessage()) {
        <div class="alert alert-error">{{ errorMessage() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="reset-password-form" novalidate>
        <div class="form-group">
          <label for="password">Nouveau mot de passe</label>
          <ds-password-requirements [password]="form.get('password')?.value ?? ''"></ds-password-requirements>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Votre nouveau mot de passe"
            class="form-input"
            [class.invalid]="fieldError('password')"
          />
          @if (fieldError('password')) {
            <span class="field-error">{{ fieldError('password') }}</span>
          }
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            placeholder="Repetez votre mot de passe"
            class="form-input"
            [class.invalid]="fieldError('confirmPassword')"
          />
          @if (fieldError('confirmPassword')) {
            <span class="field-error">{{ fieldError('confirmPassword') }}</span>
          }
        </div>

        <button type="submit" class="btn-submit" [disabled]="submitting()">
          @if (submitting()) {
            <span class="spinner"></span>
            Reinitialisation en cours...
          } @else {
            Reinitialiser le mot de passe
          }
        </button>
      </form>

      <p class="reset-password-footer">
        Retour a la
        <a class="back-link" routerLink="/sign-in">connexion</a>
      </p>
    </div>
  </div>
</div>
