<div>

<section class="pet-profile" *ngIf="pet$ | async as p">

  <div class="pet-header">
    <ds-avatar
      [src]="p.imageUrl"
      [alt]="p.name"
      size="xxlarge">
    </ds-avatar>

    <ds-title level="h1" [text]="p.name"></ds-title>
  
    <ds-button
      type="button"
      variant="secondary"
      (click)="openEditPetModal(p)"
    >
    Modifier
    </ds-button>
  </div>

  <div class="pet-details">

    <div class="info">
      <ds-title level="h4" text="Date de naissance"></ds-title>
      <span>{{ p.birthDate }}</span>
    </div>

    <div class="info">
      <ds-title level="h4" text="Couleur"></ds-title>
      <span>{{ p.color }}</span>
    </div>

    <div class="info">
      <ds-title level="h4" text="Poids"></ds-title>
      <span>{{ p.weight }} kg</span>
    </div>

    <div class="info">
      <ds-title level="h4" text="Race"></ds-title>
      <ds-tag>{{ p.breed }}</ds-tag>
    </div>

    <div class="info">
      <ds-title level="h4" text="Stérilisé"></ds-title>
      <span>
        <ds-tag *ngIf="p.sterilized">Oui</ds-tag>
        <ds-tag *ngIf="!p.sterilized">Non</ds-tag>
      </span>
    </div>

  </div>

</section>

<ds-modal-shell
    [isOpen]="isUpdateAnimalModalOpen"
    title="Modifier l'animal"
    labelledById="update-animal-title"
    closeAriaLabel="Fermer la fenetre de modification d'animal"
    (close)="closeUpdateAnimalModal()"
  >
    <form class="add-form" (submit)="submitUpdateAnimalForm($event)">
      <div class="add-form__grid">
        <div class="add-form__field">
          <label class="add-form__label" for="animal-name">Nom</label>
          <input id="animal-name" class="add-form__input" type="text" [value]="newAnimalForm.name" (input)="onFieldInput('name', $event)" required />
        </div>

        <div class="add-form__field">
          <label class="add-form__label" for="animal-breed">Race</label>
          <input id="animal-breed" class="add-form__input" type="text" [value]="newAnimalForm.breed" (input)="onFieldInput('breed', $event)" required />
        </div>

        <div class="add-form__field">
          <label class="add-form__label" for="animal-birth-date">Date de naissance</label>
          <input id="animal-birth-date" class="add-form__input" type="date" [value]="newAnimalForm.birthDate" (input)="onFieldInput('birthDate', $event)" required />
        </div>

        <div *ngIf="newAnimalForm.birthDate && !isBirthDateValid()" class="error">
          La date de naissance ne peut pas être dans le futur.
        </div>

        <div class="add-form__field">
          <label class="add-form__label" for="animal-color">Couleur</label>
          <input id="animal-color" class="add-form__input" type="text" [value]="newAnimalForm.color" (input)="onFieldInput('color', $event)" required />
        </div>

        <div class="add-form__field">
          <label class="add-form__label" for="animal-weight">Poids</label>
          <input id="animal-weight" class="add-form__input" type="text" [value]="newAnimalForm.weight" (input)="onFieldInput('weight', $event)" placeholder="Ex: 12 kg" required />
        </div>

        <div class="add-form__field">
          <label class="add-form__label" for="animal-identification">Tatouage / puce</label>
          <input id="animal-identification" class="add-form__input" type="text" [value]="newAnimalForm.identification" (input)="onFieldInput('identification', $event)" required />
        </div>

        <div class="add-form__field">
          <label class="add-form__label" for="animal-sterilized">Sterilise</label>
          <select id="animal-sterilized" class="add-form__input" [value]="newAnimalForm.sterilized" (change)="onSterilizedChange($event)" required>
            <option value="">Selectionner</option>
            <option value="yes">Oui</option>
            <option value="no">Non</option>
          </select>
        </div>

        <div class="add-form__field">
          <label class="add-form__label">Photo de profil</label>
          <ds-image-upload-field
            inputId="animal-profile-photo"
            [selectedFileName]="newAnimalForm.profilePhoto?.name ?? null"
            (fileSelected)="onProfilePhotoSelected($event)"
            [required]="true"
          ></ds-image-upload-field>
        </div>
      </div>

      <div class="add-form__actions">
        <button class="add-form__cancel" type="button" (click)="closeUpdateAnimalModal()">Annuler</button>
        <ds-button type="submit" [disabled]="!isUpdateAnimalFormValid()">Modifier</ds-button>
      </div>
    </form>
  </ds-modal-shell>

</div>
