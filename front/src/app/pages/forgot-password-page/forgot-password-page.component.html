<div class="forgot-password-page">
  <div class="content-container">
    <div class="forgot-password-card">
      <div class="forgot-password-header">
        <svg lucideHeart [size]="32" class="header-icon"></svg>
        <ds-title level="h2" text="Mot de passe oublié"></ds-title>
      </div>

      @if (successMessage()) {
        <div class="alert alert-success">{{ successMessage() }}</div>
      }

      @if (errorMessage()) {
        <div class="alert alert-error">{{ errorMessage() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="forgot-password-form" novalidate>
        <div class="form-group">
          <label for="email">Adresse e-mail</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="votre@email.com"
            class="form-input"
            [class.invalid]="fieldError('email')"
          />
          @if (fieldError('email')) {
            <span class="field-error">{{ fieldError('email') }}</span>
          }
        </div>

        <button type="submit" class="btn-submit" [disabled]="submitting()">
          @if (submitting()) {
            <span class="spinner"></span>
            Envoi en cours...
          } @else {
            Envoyer le lien de réinitialisation
          }
        </button>
      </form>

      <p class="forgot-password-footer">
        Retour à la
        <a class="back-link" routerLink="/sign-in">connexion</a>
      </p>
    </div>
  </div>
</div>
