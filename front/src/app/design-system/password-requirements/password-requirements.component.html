<ul class="password-requirements">
  @for (req of requirements; track req.label) {
    <li [class.valid]="isValid(req)" [class.invalid]="!isValid(req)">
      @if (isValid(req)) {
        <svg lucideCheck [size]="14" class="req-icon"></svg>
      } @else {
        <svg lucideX [size]="14" class="req-icon"></svg>
      }
      <span>{{ req.label }}</span>
    </li>
  }
</ul>
