<nav class="sidebar" role="navigation" aria-label="Menu du dashboard">
  <ul class="sidebar-nav">
    <li>
      <a
        class="sidebar-link"
        [routerLink]="profilePath"
        [class.active]="isActive('/dashboard/consult-profile')"
      >
        <span class="link-icon">
          <svg lucideUser></svg>
        </span>
        <span class="link-label">Mon animal</span>
      </a>
    </li>
    @for (item of galleryAndCalendar; track item.path) {
      <li>
        <a
          class="sidebar-link"
          [routerLink]="item.path"
          [class.active]="isActive(item.path)"
        >
          <span class="link-icon">
            <svg [attr.lucide]="item.iconName"></svg>
          </span>
          <span class="link-label">{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</nav>
