<nav class="sidebar" role="navigation" aria-label="Menu du dashboard">
  <div class="sidebar-header">
    <a class="sidebar-brand" routerLink="/">
      <svg lucideHeart class="brand-icon"></svg>
      <span class="brand-text">{{ logo }}</span>
    </a>
  </div>

  <ul class="sidebar-links">
    @for (link of links; track link.path) {
      <li>
        <a
          class="sidebar-link"
          [routerLink]="link.path"
          [class.active]="isActive(link.path)"
        >
          <span class="link-icon">
            <svg [attr.lucide]="link.iconName" class="link-svg"></svg>
          </span>
          <span class="link-label">{{ link.label }}</span>
        </a>
      </li>
    }
  </ul>
</nav>
