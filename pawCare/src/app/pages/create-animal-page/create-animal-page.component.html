<div class="create-animal-page">
  <div class="form-container">
    <h1 class="page-title">Nouveau compagnon</h1>
    <p class="page-subtitle">Ajoutez un nouvel animal à PawCare</p>

    <form class="animal-form">
      <div class="form-layout">
        <!-- Left Column: Photo Upload (30%) -->
        <div class="photo-card">
          <div class="photo-column">
            <label class="photo-upload">
              <input
                type="file"
                accept="image/*"
                (change)="onPhotoSelect($event)"
                hidden
              />
              <div class="photo-placeholder" [class.has-photo]="selectedPhoto">
                @if (selectedPhoto) {
                  <img [src]="selectedPhoto" alt="Photo preview" class="photo-preview" />
                } @else {
                  <div class="photo-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                      <circle cx="12" cy="12" r="9"/>
                      <circle cx="8.5" cy="8.5" r="1.5"/>
                      <polyline points="21 15 16 10 5 21"/>
                    </svg>
                  </div>
                  <span class="photo-text">Photo de<br>profil</span>
                }
              </div>
            </label>
          </div>
        </div>

        <!-- Right Column: Form Fields (70%) -->
        <div class="form-card">
          <div class="form-column">
            <div class="form-grid">
              <!-- Row 1 -->
              <div class="form-group">
                <label for="name" class="form-label">Nom</label>
                <input
                  id="name"
                  type="text"
                  class="form-input"
                  placeholder="Ex: Max, Luna..."
                  [(ngModel)]="animalForm.name"
                  name="name"
                />
              </div>

              <div class="form-group">
                <label for="type" class="form-label">Type</label>
                <select
                  id="type"
                  class="form-select"
                  [(ngModel)]="animalForm.type"
                  name="type"
                >
                  <option value="">Sélectionner</option>
                  <option value="dog">Chien</option>
                  <option value="cat">Chat</option>
                  <option value="bird">Oiseau</option>
                  <option value="rabbit">Lapin</option>
                  <option value="hamster">Hamster</option>
                  <option value="other">Autre</option>
                </select>
              </div>

              <!-- Row 2 -->
              <div class="form-group">
                <label for="breed" class="form-label">Race</label>
                <input
                  id="breed"
                  type="text"
                  class="form-input"
                  placeholder="Ex: Golden Retriever..."
                  [(ngModel)]="animalForm.breed"
                  name="breed"
                />
              </div>

              <div class="form-group">
                <label for="weight" class="form-label">Poids (kg)</label>
                <input
                  id="weight"
                  type="number"
                  class="form-input"
                  placeholder="Ex: 25"
                  [(ngModel)]="animalForm.weight"
                  name="weight"
                />
              </div>

              <!-- Row 3 -->
              <div class="form-group">
                <label for="birth" class="form-label">Naissance</label>
                <input
                  id="birth"
                  type="date"
                  class="form-input"
                  [(ngModel)]="animalForm.birth"
                  name="birth"
                />
              </div>

              <div class="form-group">
                <label for="color" class="form-label">Couleur</label>
                <select
                  id="color"
                  class="form-select"
                  [(ngModel)]="animalForm.color"
                  name="color"
                >
                  <option value="">Sélectionner</option>
                  <option value="white">Blanc</option>
                  <option value="black">Noir</option>
                  <option value="brown">Marron</option>
                  <option value="blonde">Blond</option>
                  <option value="gray">Gris</option>
                  <option value="orange">Orange/Roux</option>
                  <option value="multicolor">Multicolore</option>
                  <option value="other">Autre</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="form-actions">
        <ds-button size="large">
          Ajouter {{animalForm.name || 'le compagnon'}}
        </ds-button>
      </div>
    </form>
  </div>
</div>
