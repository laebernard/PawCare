<div class="profile-selector-page">
  <div class="profile-selector-content">
    <ds-title level="h1" text="Choisissez votre compagnon"></ds-title>

    <div class="profiles-grid">
      @for (profile of profiles; track profile.id) {
        <div
          class="profile-item"
          [class.selected]="selectedProfile?.id === profile.id"
          (click)="selectProfile(profile)"
        >
          <div class="avatar-container">
            @if (profile.photoUrl) {
              <ds-avatar [src]="profile.photoUrl" [alt]="profile.name" size="xxlarge"> </ds-avatar>
            } @else {
              <ds-avatar [fallback]="getInitials(profile.name)" [alt]="profile.name" size="xxlarge">
              </ds-avatar>
            }
          </div>

          <div class="profile-name">{{ profile.name }}</div>

          @if (selectedProfile?.id === profile.id) {
            <div class="checkmark">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
          }
        </div>
      }

      <!-- Add New Profile -->
      <div class="profile-item add-profile" (click)="goToCreateProfile()">
        <div class="avatar-container">
          <ds-avatar fallback="+" alt="Add new pet" size="xxlarge"> </ds-avatar>
        </div>
        <div class="profile-name">Ajouter</div>
      </div>
    </div>

    @if (selectedProfile) {
      <div class="continue-section">
        <ds-link variant="button" href="https://example.com/" size="large">
          Continuer avec {{ selectedProfile.name }}
        </ds-link>
      </div>
    }
  </div>
</div>
