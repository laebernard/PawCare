<h1>Design System</h1>

<section class="ds-section">
  <h2 class="section-title">Titles</h2>

  <div class="title-group">

    <div class="title-item">
      <span class="label">H1</span>
      <ds-title level="h1" text="MoodBoard"></ds-title>
    </div>

    <div class="title-item">
      <span class="label">H2</span>
      <ds-title level="h2" text="Typography"></ds-title>
    </div>

    <div class="title-item">
      <span class="label">H3</span>
      <ds-title level="h3" text="Animal club"></ds-title>
    </div>

    <div class="title-item">
      <span class="label">H4</span>
      <ds-title level="h4" text="Color Palette"></ds-title>
    </div>

  </div>
</section>

<section>
  <ds-title level="h2">Buttons</ds-title>

  <h2>Buttons</h2>

  <div style="display: flex; gap: 12px; flex-wrap: wrap;">
    <ds-button size="small">Small</ds-button>
    <ds-button size="medium">Medium</ds-button>
    <ds-button size="large">Large</ds-button>
    <ds-button size="medium" [disabled]="true">Disabled</ds-button>
  </div>
</section>

<section>
  <h2>Lightbox</h2>

  <ds-button (click)="openLightbox()">Open Lightbox</ds-button>

  <ds-lightbox
    [isOpen]="lightboxOpen"
    [imageUrl]="demoImageUrl"
    [description]="demoImageDescription"
    (close)="closeLightbox()">
  </ds-lightbox>
</section>

<section>
  <h2>Avatar</h2>

  <div class="avatar-section">
    <div style="display: flex; gap: 16px; align-items: center;">
      <ds-avatar
        src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=150&h=150&fit=crop&crop=face"
        alt="Dog"
        size="small">
      </ds-avatar>
      <ds-avatar
        src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=150&h=150&fit=crop&crop=face"
        alt="Cat"
        size="medium">
      </ds-avatar>
      <ds-avatar
        src="https://images.unsplash.com/photo-1583337130417-3346a1be7dee?w=150&h=150&fit=crop&crop=face"
        alt="Puppy"
        size="large">
      </ds-avatar>
      <ds-avatar
        src="https://images.unsplash.com/photo-1574158622682-e40e69881006?w=150&h=150&fit=crop&crop=face"
        alt="Kitten"
        size="xlarge">
      </ds-avatar>
      <ds-avatar
        src="https://images.unsplash.com/photo-1555685812-4b943f1cb0eb?w=300&h=300&fit=crop&crop=face"
        alt="Dog"
        size="xxlarge">
      </ds-avatar>
    </div>
  </div>

  <div class="avatar-section">
    <p style="margin-bottom: 16px; color: #666;">As links (href):</p>
    <div style="display: flex; gap: 16px; align-items: center;">
      <ds-avatar
        href="https://example.com/profile"
        src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=150&h=150&fit=crop&crop=face"
        alt="Profile"
        size="medium">
      </ds-avatar>
      <ds-avatar
        href="https://example.com/dashboard"
        fallback="JD"
        size="large">
      </ds-avatar>
      <ds-avatar
        href="https://example.com/new-profile"
        fallback="+"
        size="small">
      </ds-avatar>
    </div>
  </div>
</section>
<section>
  <h2>Card</h2>
  <div style="display: flex; gap: 16px; align-items: center;">
    <app-card
      image="https://placedog.net/400/300"
      title="Chien mignon"
      description="Un chien adorable à adopter"
      buttonText="Adopter">
    </app-card>
    <app-card
      image="https://placedog.net/400/300"
      title="Chien mignon"
      description="Un chien adorable à adopter"
      buttonText="Adopter">
    </app-card>
  </div>
</section>
