<div class="lightbox-backdrop" *ngIf="isOpen" (click)="onBackdropClick($event)">
  <div class="lightbox-content">
    <button class="lightbox-close" (click)="close.emit()" aria-label="Fermer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="lightbox-body">
      <div class="lightbox-image-container">
        <img [src]="imageUrl" alt="Image" class="lightbox-image">
      </div>
      <div class="lightbox-description" *ngIf="description">
        {{ description }}
      </div>
    </div>
  </div>
</div>
