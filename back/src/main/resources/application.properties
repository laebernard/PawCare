spring.application.name=back
server.port=8081

# Spring Security: silence the default user details autoconfig. We do our
# own JWT-based auth via SecurityConfig + JwtAuthFilter.
spring.security.user.name=disabled
spring.security.user.password=disabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/pawcare?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=pawcare
spring.datasource.password=pawcare123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# IMAGE
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.web.resources.static-locations=file:./uploads/
spring.mvc.static-path-pattern=/uploads/**

# CORS allowed origins (comma-separated). Overridden per profile:
#   application-dev.properties  -> local Angular dev server
#   application-prod.properties -> production frontend origin(s)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}


