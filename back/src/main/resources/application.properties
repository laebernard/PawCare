spring.application.name=back
server.port=8081

# Spring Security: silence the default user details autoconfig. We do our
# own JWT-based auth via SecurityConfig + JwtAuthFilter.
spring.security.user.name=disabled
spring.security.user.password=disabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# MySQL DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pawcare?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pawcare}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pawcare123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT
jwt.secret=${JWT_SECRET:change-me-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# IMAGE
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.web.resources.static-locations=file:./uploads/
spring.mvc.static-path-pattern=/uploads/**

# CORS allowed origins (comma-separated). Overridden per profile:
#   application-dev.properties  -> local Angular dev server
#   application-prod.properties -> production frontend origin(s)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:8080,http://127.0.0.1:8080}

# Public base URL used for generated upload links
app.base-url=${APP_BASE_URL:http://localhost:8081}


