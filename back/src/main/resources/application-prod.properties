# Production profile
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS — set this to your real frontend domain(s)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://pawcare-frontend-j03b.onrender.com}

# MySQL DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# IMAGE
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.web.resources.static-locations=file:./uploads/
spring.mvc.static-path-pattern=/uploads/**

# Base URL for uploads
app.base-url=https://pawcare-backend-1lik.onrender.com

# Frontend URL used in password reset emails
app.reset-password-url=${APP_RESET_PASSWORD_URL:https://pawcare-frontend-j03b.onrender.com/reset-password}

# Outbound email (SMTP Gmail - SSL 465)
app.mail.from=${MAIL_FROM:no-reply@pawcare.local}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.protocol=smtp
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.port=${MAIL_PORT:465}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}