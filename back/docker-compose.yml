version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pawcare-mysql
    restart: always
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pawcare123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pawcare}
      MYSQL_USER: ${MYSQL_USER:-pawcare}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pawcare123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
    container_name: pawcare-backend
    restart: always
    depends_on:
      - mysql
    env_file:
      - ../.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/pawcare?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-pawcare}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-pawcare123}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ../front
    container_name: pawcare-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pawcare-phpmyadmin
    restart: always
    depends_on:
      - mysql
    env_file:
      - ../.env
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-pawcare}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-pawcare123}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"

volumes:
  mysql_data:
